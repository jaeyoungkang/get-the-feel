<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>get-the-feel — 7개 감각, 매일 새 문장으로</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app" class="app">
    <!-- 화면은 app.js가 렌더한다 -->
    <noscript>
      <p class="noscript">이 도구는 JavaScript가 필요합니다. 브라우저에서 스크립트를 켜고 다시 열어 주세요.</p>
    </noscript>
  </main>

  <!-- 상태·검증 정보는 첫 화면에서 치우고 ⓘ 패널 뒤로 (UX 문법 G5). app.js가 토글한다. -->
  <button class="info-btn" id="info-btn" type="button" aria-label="도구 정보 열기" aria-expanded="false">ⓘ</button>
  <div class="info-panel" id="info-panel" hidden>
    <p class="info-title">도구 정보 (만든 사람용)</p>
    <ul class="info-list">
      <li>콘텐츠: 7개 감각 항목 105문장 · 버전 v1</li>
      <li>감각: have · get · take · make (핵심 동사) / up · out (불변화사) / 구동사(V+up)</li>
      <li>매 세션 새 문장 우선 공급 (출제 이력은 이 브라우저에만 저장)</li>
      <li>출처 검증 상태: 잠정 (사람 리뷰 전)</li>
      <li>후보 ID: c2-2</li>
    </ul>
    <p class="info-note">이 정보는 도구를 만드는 사람을 위한 메모입니다. 학습에는 필요하지 않습니다.</p>
  </div>

  <!-- data.js가 먼저 로드되어 window.CONTENT_ALL을 채운다 -->
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
