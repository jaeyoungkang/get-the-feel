<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Infra Bottleneck Radar</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">AI Infra Bottleneck Radar</p>
        <h1>AI 인프라 병목이 어디서 생기고 어디로 번지는지 본다</h1>
      </div>
      <div id="snapshotControls" class="snapshot-controls" aria-label="스냅샷 선택"></div>
    </header>

    <main class="workspace">
      <section class="radar-panel" aria-labelledby="radarTitle">
        <div class="panel-head">
          <div>
            <h2 id="radarTitle">Macro Bottleneck Radar</h2>
            <p id="snapshotNote">현재 index와 시나리오는 같은 radar에서 구분된다.</p>
          </div>
          <div class="legend">
            <span><i class="hot"></i>높은 압력</span>
            <span><i class="warm"></i>주의</span>
            <span><i class="cool"></i>완화</span>
          </div>
        </div>
        <svg id="radar" viewBox="0 0 900 760" role="img" aria-label="AI infrastructure bottleneck radar"></svg>
      </section>

      <aside class="detail" aria-labelledby="detailTitle">
        <div class="score-box">
          <span id="detailType">source_backed_index</span>
          <strong id="detailScore">0</strong>
        </div>
        <h2 id="detailTitle">선택 노드</h2>
        <p id="detailSummary"></p>

        <section>
          <h3>Highlighted Thin Path</h3>
          <p id="pathSummary" class="path-summary"></p>
        </section>

        <section>
          <h3>미시 신호</h3>
          <div id="microList" class="stack"></div>
        </section>

        <section>
          <h3>투자자 관찰 포인트</h3>
          <ul id="watchList"></ul>
        </section>

        <section>
          <h3>출처·Freshness 계약</h3>
          <div id="contractList" class="stack"></div>
        </section>
      </aside>
    </main>

    <section class="sources" aria-labelledby="sourceTitle">
      <h2 id="sourceTitle">초기 공식 출처</h2>
      <div id="sourceLinks"></div>
    </section>

    <script src="./app.js"></script>
  </body>
</html>
