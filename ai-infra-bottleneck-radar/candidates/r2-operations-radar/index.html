<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Infra Operations Radar</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">AI Infra Bottleneck Radar R2</p>
        <h1>병목 압력과 데이터 신선도를 함께 본다</h1>
      </div>
      <div id="snapshotControls" class="snapshot-controls" aria-label="스냅샷 선택"></div>
    </header>

    <main class="workspace">
      <section class="map-panel" aria-labelledby="mapTitle">
        <div class="panel-head">
          <div>
            <h2 id="mapTitle">HBM -> 패키징 -> 클라우드 운영 경로</h2>
            <p id="snapshotNote">각 값은 출처 위치, 담당 owner, freshness 계산, 시나리오 rule을 가진다.</p>
          </div>
          <div id="serviceBoundary" class="boundary"></div>
        </div>
        <svg id="map" viewBox="0 0 1120 560" role="img" aria-label="AI infrastructure operations bottleneck path"></svg>
      </section>

      <aside class="detail" aria-labelledby="detailTitle">
        <div class="score-box">
          <span id="freshnessLabel">freshness</span>
          <strong id="detailScore">0</strong>
        </div>
        <h2 id="detailTitle">선택 노드</h2>
        <p id="detailSummary"></p>

        <section>
          <h3>운영 계약</h3>
          <div id="contractList" class="stack"></div>
        </section>

        <section>
          <h3>미시 신호</h3>
          <div id="microList" class="stack"></div>
        </section>

        <section>
          <h3>시나리오 규칙</h3>
          <div id="scenarioRules" class="stack"></div>
        </section>

        <section>
          <h3>판매 경계</h3>
          <p id="releaseBoundary" class="note"></p>
        </section>
      </aside>
    </main>

    <section class="sources" aria-labelledby="sourceTitle">
      <h2 id="sourceTitle">공식 출처</h2>
      <div id="sourceLinks"></div>
    </section>

    <script src="./app.js"></script>
  </body>
</html>
