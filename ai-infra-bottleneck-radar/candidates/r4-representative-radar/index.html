<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Infra Representative Radar</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">AI Infra Bottleneck Radar R4</p>
        <h1>AI 인프라 병목과 전파 경로를 30초 안에 본다</h1>
      </div>
      <div id="snapshotControls" class="snapshot-controls" aria-label="스냅샷 선택"></div>
    </header>

    <main class="workspace">
      <section class="map-panel" aria-labelledby="mapTitle">
        <div class="panel-head">
          <div>
            <h2 id="mapTitle">AI Infrastructure Bottleneck Map</h2>
            <p id="snapshotNote">가장 압력이 큰 병목, 전파 경로, 현재와 미래 스냅샷을 한 화면에서 연결한다.</p>
          </div>
          <div id="promotionBoundary" class="boundary"></div>
        </div>
        <svg id="map" viewBox="0 0 1180 620" role="img" aria-label="AI infrastructure bottleneck validation map"></svg>
      </section>

      <aside class="detail" aria-labelledby="detailTitle">
        <div class="score-box">
          <span id="statusLabel">validation</span>
          <strong id="detailScore">0</strong>
        </div>
        <h2 id="detailTitle">선택 노드</h2>
        <p id="detailSummary"></p>

        <section>
          <h3>산식 구성</h3>
          <div id="formulaList" class="stack"></div>
        </section>

        <section>
          <h3>검증 샘플</h3>
          <div id="validationList" class="stack"></div>
        </section>

        <section>
          <h3>이 점수를 믿어도 되는 이유</h3>
          <div id="representativeGate" class="stack"></div>
        </section>

        <section>
          <h3>출처·신선도</h3>
          <div id="contractList" class="stack"></div>
        </section>

        <section>
          <h3>판매 경계</h3>
          <p id="releaseBoundary" class="note"></p>
        </section>
      </aside>
    </main>

    <section class="sources" aria-labelledby="sourceTitle">
      <h2 id="sourceTitle">공식 출처와 운영 파일</h2>
      <div id="sourceLinks"></div>
    </section>

    <script src="./app.js"></script>
  </body>
</html>
